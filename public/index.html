<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skyo-prediction</title>
  <link rel="stylesheet" href="/styles.css">
  <script type="importmap">
  {
    "imports": {
      "spektrum": "https://unpkg.com/spektrum@0/spektrum.min.js",
      "spektrum/persist": "https://unpkg.com/spektrum@0/spektrum-persist.js",
      "spektrum/devtools": "https://unpkg.com/spektrum@0/spektrum-devtools.js"
    }
  }
  </script>
</head>
<body>
  <main id="app">
    <h1>{{title}}</h1>
    <p class="status" :class="{ready: status === 'Ready'}">{{status}}</p>

    <section class="radar-status">
      <h2>Radar history</h2>
      <p class="muted" data-if="radarHistory.loading">Loading frames from RainViewer…</p>
      <p class="error" data-if="radarHistory.error">Failed to load: {{radarHistory.error.message}}</p>
      <p data-if="frameCount">Loaded <strong>{{frameCount}}</strong> frames. Latest: <code>{{latestFrameTime}}</code></p>
      <p class="hint">Inspect <code>appState.radarHistory.data</code> in the dev console to see decoded grids.</p>
    </section>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
